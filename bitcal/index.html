<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitCal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #E2E8F0;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }
    .icon {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      margin: 0 auto 32px;
      box-shadow: 0 8px 32px rgba(245,158,11,0.3);
      overflow: hidden;
    }
    .icon img { width: 100%; height: 100%; object-fit: cover; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #F5A623; }
    .subtitle { font-size: 16px; color: #94A3B8; margin-bottom: 32px; }
    .features {
      text-align: left;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 32px;
    }
    .features h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #E2E8F0; }
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      font-size: 15px;
      color: #CBD5E1;
    }
    .feature-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #F5A623;
      flex-shrink: 0;
    }
    .badge {
      display: inline-block;
      margin-top: 8px;
    }
    .badge img { height: 48px; }
    .contact {
      margin-top: 24px;
      font-size: 13px;
      color: #64748B;
    }
    .contact a { color: #94A3B8; }
  </style>
  <script>
    const i18n = {
      ko: {
        subtitle: 'BTC 도달량 계산기 & DCA 시뮬레이터',
        heading: '주요 기능',
        features: [
          '실시간 BTC 시세로 실수령량 즉시 계산',
          '국내·해외 거래소 수수료 자동 반영',
          'DCA 목표 시뮬레이션 (목표 BTC까지 몇 개월?)',
          'DCA 적립 시뮬레이션 (10년 후 자산 예측)',
        ],
        badgeLang: 'ko-kr',
        contact: '문의하기',
      },
      ja: {
        subtitle: 'BTC出金計算機 & DCAシミュレーター',
        heading: '主な機能',
        features: [
          'リアルタイムBTC価格で出金額を即計算',
          '国内・海外取引所の手数料を自動反映',
          'DCA目標シミュレーション（目標BTCまで何ヶ月？）',
          'DCA積立シミュレーション（10年後の資産予測）',
        ],
        badgeLang: 'ja-jp',
        contact: 'お問い合わせ',
      },
    };

    function render() {
      const lang = (navigator.language || '').startsWith('ko') ? 'ko' : 'ja';
      const t = i18n[lang];
      document.documentElement.lang = lang;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('heading').textContent = t.heading;
      const list = document.getElementById('features');
      list.innerHTML = t.features.map(f =>
        '<div class="feature"><span class="feature-dot"></span>' + f + '</div>'
      ).join('');
      document.getElementById('badge-img').src =
        'https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/' + t.badgeLang + '?size=250x83';
      document.getElementById('contact-link').textContent = t.contact;
    }

    document.addEventListener('DOMContentLoaded', render);
  </script>
</head>
<body>
  <div class="container">
    <div class="icon">
      <img src="icon.png" alt="BitCal App Icon">
    </div>
    <h1>BitCal</h1>
    <p class="subtitle" id="subtitle"></p>
    <div class="features">
      <h2 id="heading"></h2>
      <div id="features"></div>
    </div>
    <a class="badge" href="https://apps.apple.com/app/bitcal/id6761324597">
      <img id="badge-img" src="" alt="Download on the App Store">
    </a>
    <div class="contact">
      <p><a id="contact-link" href="https://nanokit.work/?form=vh2siZp9XxHF2RXfDUHg"></a></p>
    </div>
  </div>
</body>
</html>
