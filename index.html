<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eyeday</title>
  <style>
    @font-face {
      font-family: 'LINESeedJP';
      src: url('fonts/LINESeedJP-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'LINESeedJP';
      src: url('fonts/LINESeedJP-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'LINESeedJP', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #DBEAFE 0%, #F8FAFC 40%, #EFF6FF 100%);
      min-height: 100vh;
      color: #1E293B;
      line-height: 1.55;
    }

    /* Top language switch */
    .lang-switch {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 50;
      font-family: inherit;
      background: rgba(255,255,255,0.85);
      border: 1px solid #E2E8F0;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      color: #334155;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Hero */
    .hero {
      max-width: 760px;
      margin: 0 auto;
      padding: 72px 24px 24px;
      text-align: center;
    }
    .icon {
      width: 104px;
      height: 104px;
      border-radius: 24px;
      margin: 0 auto 24px;
      box-shadow: 0 12px 32px rgba(59,130,246,0.28);
      overflow: hidden;
    }
    .icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    h1 {
      font-family: 'LINESeedJP', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 44px;
      font-weight: 700;
      color: #3B82F6;
      letter-spacing: 0.2px;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 17px;
      color: #475569;
      margin-bottom: 28px;
    }
    .badge { display: inline-block; }
    .badge img { height: 52px; display: block; }

    /* Mockups */
    .mockups {
      max-width: 1040px;
      margin: 0 auto;
      padding: 32px 24px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      justify-content: center;
    }
    .phone {
      width: 280px;
      flex-shrink: 0;
      background: #0F172A;
      border-radius: 40px;
      padding: 8px;
      box-shadow: 0 24px 48px rgba(15,23,42,0.18), 0 8px 16px rgba(15,23,42,0.10);
    }
    .phone-screen {
      background: #FAFAFA;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
      aspect-ratio: 9 / 19.5;
      display: flex;
      flex-direction: column;
    }
    /* Status bar */
    .status-bar {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      font-size: 11px;
      font-weight: 600;
      color: #1E293B;
      background: #FAFAFA;
    }
    .notch {
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 88px;
      height: 22px;
      background: #0F172A;
      border-radius: 14px;
      z-index: 2;
    }
    .status-bar .right { display: flex; gap: 4px; align-items: center; }
    .signal { width: 14px; height: 9px; background: #1E293B; border-radius: 1px; }
    .battery {
      width: 22px;
      height: 10px;
      border: 1px solid #1E293B;
      border-radius: 2px;
      position: relative;
      padding: 1px;
    }
    .battery::after {
      content: '';
      position: absolute;
      right: -3px;
      top: 3px;
      width: 2px;
      height: 4px;
      background: #1E293B;
      border-radius: 0 1px 1px 0;
    }
    .battery span { display: block; width: 75%; height: 100%; background: #1E293B; border-radius: 1px; }

    /* Phone content shared */
    .phone-content {
      flex: 1;
      overflow: hidden;
      padding: 0 16px 16px;
    }
    .phone-title {
      font-size: 22px;
      font-weight: 700;
      color: #3B82F6;
      font-family: 'LINESeedJP', sans-serif;
      letter-spacing: 0.2px;
      padding: 4px 0 12px;
    }

    /* Timeline mockup */
    .weekly {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;
    }
    .day {
      flex: 1;
      text-align: center;
      padding: 6px 0;
      font-size: 10px;
      color: #71717A;
      border-radius: 10px;
    }
    .day .num {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #27272A;
      margin-top: 2px;
    }
    .day.today {
      background: #3B82F6;
      color: #FFFFFF;
    }
    .day.today .num { color: #FFFFFF; }
    .timeline-card {
      background: #FFFFFF;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tl-time {
      font-size: 13px;
      font-weight: 700;
      color: #27272A;
      width: 46px;
      flex-shrink: 0;
    }
    .tl-info { flex: 1; min-width: 0; }
    .tl-name { font-size: 13px; font-weight: 600; color: #27272A; }
    .tl-sub { font-size: 11px; color: #71717A; margin-top: 1px; }
    .tl-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #E4E4E7;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tl-check.done {
      background: #3B82F6;
      border-color: #3B82F6;
    }
    .tl-check.done::after {
      content: '';
      width: 12px;
      height: 6px;
      border-left: 2px solid #FFFFFF;
      border-bottom: 2px solid #FFFFFF;
      transform: rotate(-45deg) translate(1px, -2px);
    }
    .tl-check.green { border-color: #22C55E; }
    .tl-check.green.done { background: #22C55E; }
    .dot-medicine {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-blue { background: #3B82F6; }
    .dot-green { background: #22C55E; }

    /* IOP chart mockup */
    .iop-summary {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .iop-pill {
      flex: 1;
      background: #FFFFFF;
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .iop-pill .label { font-size: 10px; color: #71717A; }
    .iop-pill .value {
      font-size: 18px;
      font-weight: 700;
      color: #27272A;
      margin-top: 2px;
    }
    .iop-pill .value small { font-size: 11px; font-weight: 500; color: #71717A; }
    .iop-chart {
      background: #FFFFFF;
      border-radius: 14px;
      padding: 14px 12px 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .iop-legend {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      font-size: 10px;
      color: #71717A;
      margin-bottom: 8px;
    }
    .iop-legend .swatch {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .chart-area {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 130px;
      padding-bottom: 18px;
      position: relative;
    }
    .chart-area::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 18px;
      height: 1px;
      background: #E4E4E7;
    }
    .chart-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      height: 100%;
      justify-content: flex-end;
      position: relative;
    }
    .chart-bars {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 100%;
      width: 100%;
      justify-content: center;
    }
    .bar {
      width: 6px;
      border-radius: 3px 3px 0 0;
    }
    .bar.right { background: #3B82F6; }
    .bar.left  { background: #8B5CF6; }
    .chart-x {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: #71717A;
      white-space: nowrap;
    }

    /* Features */
    .features-wrap {
      max-width: 760px;
      margin: 24px auto 0;
      padding: 0 24px;
    }
    .features {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 28px 28px 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.05);
    }
    .features h2 {
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 18px;
      color: #1E293B;
    }
    .feature {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 10px 0;
      font-size: 15px;
      color: #334155;
      border-top: 1px solid #F1F5F9;
    }
    .feature:first-of-type { border-top: 0; padding-top: 4px; }
    .feature-num {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: #DBEAFE;
      color: #2563EB;
      font-weight: 700;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Footer */
    footer {
      max-width: 760px;
      margin: 48px auto 0;
      padding: 32px 24px 56px;
      text-align: center;
      font-size: 13px;
      color: #94A3B8;
      border-top: 1px solid rgba(148,163,184,0.18);
    }
    footer .links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-bottom: 12px;
    }
    footer .links a {
      color: #475569;
      text-decoration: none;
      font-size: 14px;
    }
    footer .links a:hover { color: #2563EB; text-decoration: underline; }
    footer .sep { color: #CBD5E1; }
    footer .copyright { color: #94A3B8; font-size: 12px; }

    @media (max-width: 640px) {
      h1 { font-size: 36px; }
      .subtitle { font-size: 15px; }
      .hero { padding-top: 56px; }
      .mockups { gap: 20px; padding: 24px 16px 8px; }
      .phone { width: 248px; }
      .features-wrap { padding: 0 16px; }
      .features { padding: 22px 20px; }
    }
  </style>
</head>

const BADGES = {"ko": "ko-kr", "en": "en-us", "ja": "ja-jp", "fr": "fr-fr", "es": "es-es", "ru": "ru-ru", "de": "de-de", "it": "it-it", "pt": "pt-br"};
const LANGS = ["ko", "en", "ja", "fr", "es", "ru", "de", "it", "pt"];

function pickInitialLang() {
  const saved = localStorage.getItem('eyeday_lang');
  if (saved && LANGS.includes(saved)) return saved;
  const nav = (navigator.language || 'ko').toLowerCase();
  for (const l of LANGS) { if (nav.startsWith(l)) return l; }
  return 'ko';
}

function applyLang(lang) {
  const dict = UI[lang] || UI.ko;
  const mockDict = MOCK[lang] || MOCK.ko;
  document.documentElement.lang = lang;
  document.title = dict.title;
  document.querySelectorAll('[data-i]').forEach((el) => {
    const k = el.getAttribute('data-i');
    if (dict[k] != null) el.textContent = dict[k];
  });
  document.querySelectorAll('[data-mock]').forEach((el) => {
    const k = el.getAttribute('data-mock');
    if (mockDict[k] != null) el.textContent = mockDict[k];
  });
  const bl = BADGES[lang] || 'ko-kr';
  const img = document.getElementById('badgeImg');
  if (img) img.src = `https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/${bl}?size=250x83`;
  localStorage.setItem('eyeday_lang', lang);
  const sel = document.getElementById('langSwitch');
  if (sel) sel.value = lang;
}

document.addEventListener('DOMContentLoaded', () => {
  applyLang(pickInitialLang());
  document.getElementById('langSwitch').addEventListener('change', (e) => applyLang(e.target.value));
});
