<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>doday — Contact</title>
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --fg: #09090b;
      --bg: #fafafa;
      --card: #ffffff;
      --muted: #71717a;
      --border: #e5e5e5;
      --err: #e5484d;
      --ok: #15803d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      line-height: 1.6;
      letter-spacing: -0.01em;
      padding: 32px 16px 64px;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 560px; margin: 0 auto; }
    .controls { display: flex; justify-content: flex-end; margin-bottom: 18px; }
    .lang-select {
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 32px 8px 12px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2309090b' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat: no-repeat;
      background-position: right 10px center;
    }
    .lang-select:focus { outline: none; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .lead { font-size: 14.5px; color: var(--muted); margin-bottom: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 26px 22px 28px; }
    .field { margin-bottom: 20px; }
    label.field-label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .type-group { display: flex; gap: 8px; }
    .type-btn {
      flex: 1;
      padding: 11px 4px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      color: var(--muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .type-btn.active { background: var(--fg); border-color: var(--fg); color: #fff; }
    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 15px;
      color: var(--fg);
      background: #fff;
      outline: none;
      transition: border-color 0.15s ease;
    }
    input:focus, textarea:focus { border-color: var(--fg); }
    textarea { resize: vertical; min-height: 140px; line-height: 1.55; }
    .err { color: var(--err); font-size: 13px; margin-top: 6px; display: none; }
    .field.invalid .err { display: block; }
    .field.invalid input, .field.invalid textarea { border-color: var(--err); }
    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--fg);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .submit-btn:disabled { opacity: 0.6; cursor: default; }
    .banner { display: none; padding: 13px 16px; border-radius: 10px; font-size: 14px; font-weight: 600; margin-bottom: 18px; text-align: center; }
    .banner.success { display: block; background: #dcfce7; color: var(--ok); }
    .banner.error { display: block; background: #fee2e2; color: var(--err); }
    .back-link { display: inline-block; margin-top: 20px; font-size: 14px; color: var(--fg); text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="controls">
      <select id="languageSelect" class="lang-select" aria-label="Language">
        <option value="ko">한국어</option>
        <option value="ja">日本語</option>
        <option value="en">English</option>
      </select>
    </div>

    <h1 id="title">Contact</h1>
    <p class="lead" id="lead"></p>

    <div class="card">
      <div class="banner" id="banner"></div>
      <form id="contactForm" novalidate>
        <div class="field">
          <label class="field-label" id="typeLabel"></label>
          <div class="type-group" id="typeGroup">
            <button type="button" class="type-btn active" data-type="bug" id="typeBug"></button>
            <button type="button" class="type-btn" data-type="feedback" id="typeFeedback"></button>
            <button type="button" class="type-btn" data-type="other" id="typeOther"></button>
          </div>
        </div>

        <div class="field" id="emailField">
          <label class="field-label" for="email" id="emailLabel"></label>
          <input type="email" id="email" name="email" autocomplete="email" />
          <div class="err" id="emailErr"></div>
        </div>

        <div class="field" id="messageField">
          <label class="field-label" for="message" id="messageLabel"></label>
          <textarea id="message" name="message"></textarea>
          <div class="err" id="messageErr"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn"></button>
      </form>
    </div>

    <a href="../" class="back-link" id="backLink"></a>
  </div>

  <script>
    // Web3Forms 액세스 키 — 제출 내용을 등록된 이메일(contact@posiki.com)로 발송.
    // ※ 같은 개발자 키 재사용. doday 전용 키가 필요하면 web3forms.com에서 발급 후 교체.
    var WEB3FORMS_ACCESS_KEY = "cebd2e85-4cfb-4917-8943-8a789ba9f2a3";

    var UI = {
      ko: { title:"문의", lead:"버그 신고, 피드백, 기타 문의를 남겨주세요", typeLabel:"문의 유형", bug:"버그", feedback:"피드백", other:"기타", emailLabel:"이메일 주소", emailPlaceholder:"you@example.com", messageLabel:"메시지", messagePlaceholder:"내용을 입력해주세요", submit:"보내기", sending:"전송 중", success:"문의가 전송되었어요 감사합니다", error:"전송에 실패했어요 잠시 후 다시 시도해주세요", emailRequired:"이메일 주소를 입력해주세요", emailInvalid:"올바른 이메일 주소를 입력해주세요", messageRequired:"메시지를 입력해주세요", back:"← 홈으로" },
      ja: { title:"お問い合わせ", lead:"バグ報告、フィードバック、その他のお問い合わせをお寄せください", typeLabel:"お問い合わせの種類", bug:"バグ", feedback:"フィードバック", other:"その他", emailLabel:"メールアドレス", emailPlaceholder:"you@example.com", messageLabel:"メッセージ", messagePlaceholder:"内容をご記入ください", submit:"送信", sending:"送信中", success:"お問い合わせを送信しました ありがとうございます", error:"送信に失敗しました しばらくしてから再度お試しください", emailRequired:"メールアドレスを入力してください", emailInvalid:"正しいメールアドレスを入力してください", messageRequired:"メッセージを入力してください", back:"← ホームへ" },
      en: { title:"Contact", lead:"Report a bug, share feedback, or send us a question", typeLabel:"Inquiry type", bug:"Bug", feedback:"Feedback", other:"Other", emailLabel:"Email address", emailPlaceholder:"you@example.com", messageLabel:"Message", messagePlaceholder:"Write your message", submit:"Send", sending:"Sending", success:"Your message has been sent, thank you", error:"Failed to send, please try again later", emailRequired:"Please enter your email address", emailInvalid:"Please enter a valid email address", messageRequired:"Please enter a message", back:"← Back to home" }
    };

    var SUPPORTED = Object.keys(UI);
    var $ = function (id) { return document.getElementById(id); };
    var currentLang = "ko";
    var selectedType = "bug";

    function detectLang() {
      try { var s = localStorage.getItem("doday_lang"); if (s && SUPPORTED.indexOf(s) !== -1) return s; } catch (e) {}
      var qs = new URLSearchParams(location.search).get("lang");
      if (qs && SUPPORTED.indexOf(qs) !== -1) return qs;
      var nav = (navigator.language || "en").slice(0, 2).toLowerCase();
      return SUPPORTED.indexOf(nav) !== -1 ? nav : "en";
    }

    function applyLang(lang) {
      currentLang = lang;
      var t = UI[lang];
      document.documentElement.lang = lang;
      $("title").textContent = t.title;
      $("lead").textContent = t.lead;
      $("typeLabel").textContent = t.typeLabel;
      $("typeBug").textContent = t.bug;
      $("typeFeedback").textContent = t.feedback;
      $("typeOther").textContent = t.other;
      $("emailLabel").textContent = t.emailLabel;
      $("email").placeholder = t.emailPlaceholder;
      $("messageLabel").textContent = t.messageLabel;
      $("message").placeholder = t.messagePlaceholder;
      $("submitBtn").textContent = t.submit;
      $("backLink").textContent = t.back;
      document.title = "doday — " + t.title;
      try { localStorage.setItem("doday_lang", lang); } catch (e) {}
    }

    $("languageSelect").addEventListener("change", function () { applyLang(this.value); });

    $("typeGroup").addEventListener("click", function (e) {
      var btn = e.target.closest(".type-btn");
      if (!btn) return;
      selectedType = btn.getAttribute("data-type");
      Array.prototype.forEach.call(document.querySelectorAll(".type-btn"), function (b) {
        b.classList.toggle("active", b === btn);
      });
    });

    function isValidEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
    function showBanner(kind, msg) { var b = $("banner"); b.className = "banner " + kind; b.textContent = msg; }
    function clearBanner() { $("banner").className = "banner"; }

    $("contactForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var t = UI[currentLang];
      clearBanner();

      var emailField = $("emailField");
      var messageField = $("messageField");
      emailField.classList.remove("invalid");
      messageField.classList.remove("invalid");

      var email = $("email").value.trim();
      var message = $("message").value.trim();
      var ok = true;

      if (!email) { $("emailErr").textContent = t.emailRequired; emailField.classList.add("invalid"); ok = false; }
      else if (!isValidEmail(email)) { $("emailErr").textContent = t.emailInvalid; emailField.classList.add("invalid"); ok = false; }
      if (!message) { $("messageErr").textContent = t.messageRequired; messageField.classList.add("invalid"); ok = false; }
      if (!ok) return;

      var typeLabelText = t[selectedType];
      var payload = {
        access_key: WEB3FORMS_ACCESS_KEY,
        subject: "[doday] " + typeLabelText + " — " + email,
        from_name: "doday Contact",
        email: email,
        inquiry_type: typeLabelText,
        language: currentLang,
        message: message
      };

      var btn = $("submitBtn");
      btn.disabled = true;
      btn.textContent = t.sending;

      fetch("https://api.web3forms.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(payload)
      })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (data.success) { showBanner("success", t.success); $("contactForm").reset(); }
          else { showBanner("error", t.error); }
        })
        .catch(function () { showBanner("error", t.error); })
        .finally(function () { btn.disabled = false; btn.textContent = UI[currentLang].submit; });
    });

    (function init() {
      var lang = detectLang();
      $("languageSelect").value = lang;
      applyLang(lang);
    })();
  </script>
</body>
</html>
