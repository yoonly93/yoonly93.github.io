<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom — Coffee Journal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #09090b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .container { max-width: 480px; text-align: center; }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 18px; color: #71717a; margin-bottom: 32px; }
    .desc { font-size: 16px; line-height: 1.7; color: #3f3f46; margin-bottom: 40px; text-align: left; }
    .features { text-align: left; margin-bottom: 40px; }
    .feature {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      font-size: 15px;
      line-height: 1.6;
      color: #3f3f46;
    }
    .feature-num {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      background: #09090b;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      margin-top: 2px;
    }
    .privacy {
      margin-top: 48px;
      font-size: 13px;
      color: #a1a1aa;
    }
    .privacy a { color: #71717a; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bloom</h1>
    <p class="subtitle">Coffee Journal</p>
    <p class="desc" id="desc"></p>
    <div class="features" id="features"></div>
    <div class="privacy">
      <a href="mailto:wildkindground@gmail.com">wildkindground@gmail.com</a>
    </div>
  </div>
  <script>
    var i18n = {
      ko: {
        desc: '스페셜티 커피 좋아하세요?<br>새 원두를 살 때마다, 한 잔 마실 때마다 기록해보세요.<br><br>Bloom은 원두 정보를 사진 찍어 스캔하면 자동으로 기록하고 멋진 카드로 만들어줍니다. 바리스타 챔피언들의 레시피로 정확하게 추출할 수 있는 커피 도구입니다.',
        features: [
          '카메라로 패키지를 찍으면 국가, 지역, 농장, 품종, 가공법을 자동으로 입력합니다. 타이핑 필요 없습니다.',
          '각 원두는 컵노트의 풍미에 따라 고유한 색감의 카드가 됩니다. 뒤집으면 사진, 평점, 테이스팅 노트를 확인할 수 있습니다.',
          '테츠 카츠야, 정인성 등 바리스타 챔피언들의 레시피나 나만의 레시피를 단계별 타이머를 통해 쉽게 내려보세요.',
          '내가 마셔온 커피들을 산지, 품종, 가공법, 컵노트, 평점별로 필터링해서 나의 커피 취향을 한눈에 파악하세요.'
        ]
      },
      en: {
        desc: 'Love specialty coffee?<br>Start logging every new bag, every single cup.<br><br>Bloom scans your coffee bag and automatically turns the details into a beautiful card. Brew with precision using recipes from champion baristas.',
        features: [
          'Snap a photo of the package \u2014 origin, region, farm, variety, and process are filled in automatically. No typing required.',
          'Each bean becomes a unique card colored by its flavor notes. Flip it over to see your photo, rating, and tasting notes.',
          'Brew step by step with built-in recipes from champion baristas like Tetsu Kasuya and Jung Insung \u2014 or create your own.',
          'Filter your collection by origin, variety, process, cup notes, and rating to discover your coffee taste at a glance.'
        ]
      },
      ja: {
        desc: '\u30b9\u30da\u30b7\u30e3\u30eb\u30c6\u30a3\u30b3\u30fc\u30d2\u30fc\u3001\u597d\u304d\u3067\u3059\u304b\uff1f<br>\u65b0\u3057\u3044\u8c46\u3092\u8cb7\u3046\u305f\u3073\u3001\u4e00\u676f\u6dc9\u308c\u308b\u305f\u3073\u306b\u8a18\u9332\u3057\u3066\u307f\u307e\u305b\u3093\u304b\u3002<br><br>Bloom\u306f\u30b3\u30fc\u30d2\u30fc\u8c46\u306e\u30d1\u30c3\u30b1\u30fc\u30b8\u3092\u64ae\u308b\u3060\u3051\u3067\u60c5\u5831\u3092\u81ea\u52d5\u3067\u8aad\u307f\u53d6\u308a\u3001\u7f8e\u3057\u3044\u30ab\u30fc\u30c9\u306b\u4ed5\u4e0a\u3052\u307e\u3059\u3002\u30d0\u30ea\u30b9\u30bf\u30c1\u30e3\u30f3\u30d4\u30aa\u30f3\u306e\u30ec\u30b7\u30d4\u3067\u3001\u6b63\u78ba\u306b\u4e00\u676f\u3092\u3002',
        features: [
          '\u30d1\u30c3\u30b1\u30fc\u30b8\u3092\u30ab\u30e1\u30e9\u3067\u64ae\u308b\u3060\u3051\u3002\u56fd\u3001\u5730\u57df\u3001\u8fb2\u5712\u3001\u54c1\u7a2e\u3001\u7cbe\u88fd\u65b9\u6cd5\u304c\u81ea\u52d5\u5165\u529b\u3055\u308c\u307e\u3059\u3002\u30bf\u30a4\u30d4\u30f3\u30b0\u306f\u4e0d\u8981\u3067\u3059\u3002',
          '\u305d\u308c\u305e\u308c\u306e\u8c46\u306f\u30ab\u30c3\u30d7\u30ce\u30fc\u30c8\u306e\u98a8\u5473\u306b\u5408\u308f\u305b\u305f\u8272\u5408\u3044\u306e\u30ab\u30fc\u30c9\u306b\u306a\u308a\u307e\u3059\u3002\u88cf\u8fd4\u3059\u3068\u5199\u771f\u30fb\u8a55\u4fa1\u30fb\u30c6\u30a4\u30b9\u30c6\u30a3\u30f3\u30b0\u30ce\u30fc\u30c8\u304c\u78ba\u8a8d\u3067\u304d\u307e\u3059\u3002',
          '\u7c95\u8c37\u54f2\u3084\u30c1\u30e7\u30f3\u30fb\u30a4\u30f3\u30bd\u30f3\u306a\u3069\u30d0\u30ea\u30b9\u30bf\u30c1\u30e3\u30f3\u30d4\u30aa\u30f3\u306e\u30ec\u30b7\u30d4\u3084\u81ea\u5206\u3060\u3051\u306e\u30ec\u30b7\u30d4\u3092\u3001\u30b9\u30c6\u30c3\u30d7\u3054\u3068\u306e\u30bf\u30a4\u30de\u30fc\u3067\u624b\u8efd\u306b\u62bd\u51fa\u3067\u304d\u307e\u3059\u3002',
          '\u7523\u5730\u30fb\u54c1\u7a2e\u30fb\u7cbe\u88fd\u65b9\u6cd5\u30fb\u30ab\u30c3\u30d7\u30ce\u30fc\u30c8\u30fb\u8a55\u4fa1\u3067\u30d5\u30a3\u30eb\u30bf\u30ea\u30f3\u30b0\u3057\u3066\u3001\u81ea\u5206\u306e\u30b3\u30fc\u30d2\u30fc\u306e\u597d\u307f\u3092\u3072\u3068\u76ee\u3067\u628a\u63e1\u3057\u307e\u3057\u3087\u3046\u3002'
        ]
      }
    };

    function getLang() {
      var lang = (navigator.language || navigator.userLanguage || 'en').slice(0, 2);
      return i18n[lang] ? lang : 'en';
    }

    function render() {
      var lang = getLang();
      var t = i18n[lang];
      document.documentElement.lang = lang;
      document.getElementById('desc').innerHTML = t.desc;
      var html = '';
      for (var i = 0; i < t.features.length; i++) {
        html += '<div class="feature"><div class="feature-num">' + (i + 1) + '</div><div>' + t.features[i] + '</div></div>';
      }
      document.getElementById('features').innerHTML = html;
    }

    render();
  </script>
</body>
</html>
