<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>페이지를 찾을 수 없습니다</title>
  <style>
    :root {
      --bg: #FFFFFF;
      --text: #14171F;
      --secondary: #5E6675;
      --accent: #E02B33;
      --border: #E1E5EC;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    }
    main {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: var(--secondary);
      margin: 0 0 24px;
      max-width: 360px;
    }
    a.cta {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="heading">페이지를 찾을 수 없습니다</h1>
    <p id="message">주소를 다시 확인해주세요.</p>
    <a class="cta" id="cta" href="/">홈으로 가기</a>
  </main>
  <script>
    (function () {
      var match = window.location.pathname.match(/^\/buzztalk\/room\/([^/]+)\/?$/);
      if (!match) {
        return;
      }
      window.location.replace('/buzztalk/?room=' + match[1]);
    })();
  </script>
</body>
</html>
