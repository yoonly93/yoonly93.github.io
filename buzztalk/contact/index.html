<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>문의하기 - 실검톡</title>
  <meta name="description" content="실검톡 문의하기 페이지입니다.">
  <link rel="icon" href="../assets/favicon/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../assets/favicon/icon-192.png">
  <link rel="apple-touch-icon" href="../assets/favicon/icon-180.png">
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/site.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="/buzztalk/"><strong>실검톡</strong><span>BuzzTalk</span></a>
    </div>
  </header>

  <main class="page">
    <div class="wrap">
      <h1 class="page-title">문의하기</h1>

      <section class="content">
        <div class="notice">
          주민등록번호, 전화번호, 주소, 계정 비밀번호 등 민감한 개인정보를 문의 내용에 포함하지 마세요. 익명 서비스 특성상 본인 확인이 어려운 경우 일부 요청은 처리되지 않을 수 있습니다.
        </div>

        <div class="form-banner" data-form-banner hidden></div>

        <form class="contact-form" data-contact-form novalidate>
          <div class="field">
            <label for="type">문의 유형</label>
            <select id="type" name="type">
              <option>버그</option>
              <option>제안</option>
              <option>기타</option>
            </select>
          </div>
          <div class="field">
            <label for="replyTo">답변받을 이메일</label>
            <input id="replyTo" name="replyTo" type="email" autocomplete="email" placeholder="example@email.com">
          </div>
          <div class="field">
            <label for="subject">제목</label>
            <input id="subject" name="subject" type="text" required placeholder="예: 신고 처리 문의">
          </div>
          <div class="field">
            <label for="appVersion">앱 버전</label>
            <input id="appVersion" name="appVersion" type="text" placeholder="예: 1.0.0">
          </div>
          <div class="field">
            <label for="device">기기/OS 정보</label>
            <input id="device" name="device" type="text" placeholder="예: iPhone 15, iOS 18">
          </div>
          <div class="field">
            <label for="body">내용</label>
            <textarea id="body" name="body" required placeholder="문의 내용을 입력하세요."></textarea>
          </div>
          <button class="button" type="submit" data-submit-button>문의하기</button>
        </form>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <div class="footer-brand">
        <span>실검톡 BuzzTalk</span>
        <span class="footer-copyright">© 2026 Posiki</span>
      </div>
      <nav class="footer-links" aria-label="하단 링크">
        <a href="/buzztalk/privacy/">개인정보처리방침</a>
        <a href="/buzztalk/terms/">이용약관</a>
        <a href="/buzztalk/contact/">문의하기</a>
      </nav>
    </div>
  </footer>
</body>
</html>
