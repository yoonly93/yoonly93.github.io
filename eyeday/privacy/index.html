    // 기본 언어는 영어. URL ?lang= 로 지정 가능.
    let currentLang = 'en';
    let currentVersion = 'v3';

    function render() {
      const d = DATA[currentLang][currentVersion];
      const ui = UI[currentLang];
      document.documentElement.lang = currentLang;
      document.getElementById('pageTitle').textContent = ui.title;
      document.getElementById('verLabel').textContent = ui.verLabel;
      document.getElementById('langLabel').textContent = ui.langLabel;
      document.title = ui.title;
      const badge = '<span class="badge-ver">' + currentVersion + '</span>';
      document.getElementById('content').innerHTML =
        '<p class="effective">' + badge + d.effective + '</p>' + d.html;
    }

    document.getElementById('languageSelect').addEventListener('change', function (e) {
      currentLang = e.target.value;
      render();
    });
    document.getElementById('versionSelect').addEventListener('change', function (e) {
      currentVersion = e.target.value;
      render();
    });

    // URL ?lang=ko&v=v2 지원
    var params = new URLSearchParams(location.search);
    var langParam = params.get('lang');
    var verParam = params.get('v');
    if (langParam && DATA[langParam]) {
      currentLang = langParam;
      document.getElementById('languageSelect').value = langParam;
    } else {
      document.getElementById('languageSelect').value = currentLang;
    }
    if (verParam && (verParam === 'v1' || verParam === 'v2' || verParam === 'v3')) {
      currentVersion = verParam;
      document.getElementById('versionSelect').value = verParam;
    }
    render();
  </script>
