const LANGS = ["en", "ko", "ja", "fr", "es", "ru", "de", "it", "pt"];

function pickInitialLang() {
  const params = new URLSearchParams(location.search);
  const param = params.get('lang');
  if (param && LANGS.includes(param)) return param;
  const saved = localStorage.getItem('eyeday_lang');
  if (saved && LANGS.includes(saved)) return saved;
  const nav = (navigator.language || 'en').toLowerCase();
  for (const l of LANGS) { if (nav.startsWith(l)) return l; }
  return 'en';
}

function applyLang(lang) {
  const data = TERMS[lang] || TERMS.en;
  document.documentElement.lang = lang;
  document.title = `eyeday — ${data.title}`;
  document.getElementById('title').textContent = data.title;
  document.getElementById('body').textContent = data.body;
  document.getElementById('langLabel').textContent = UI_LANG_LABEL[lang] || 'Language';
  document.getElementById('languageSelect').value = lang;
  localStorage.setItem('eyeday_lang', lang);
}

document.addEventListener('DOMContentLoaded', () => {
  applyLang(pickInitialLang());
  document.getElementById('languageSelect').addEventListener('change', (e) => applyLang(e.target.value));
});
