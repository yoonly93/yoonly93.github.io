const LANGS = ["en", "ko", "ja", "fr", "es", "ru", "de", "it", "pt"];

function pickInitialLang() {
  const params = new URLSearchParams(location.search);
  const param = params.get('lang');
  if (param && LANGS.includes(param)) return param;
  const saved = localStorage.getItem('eyeday_lang');
  if (saved && LANGS.includes(saved)) return saved;
  const nav = (navigator.language || 'en').toLowerCase();
  for (const l of LANGS) { if (nav.startsWith(l)) return l; }
  return 'en';
}

function applyLang(lang) {
  const ui = UI[lang] || UI.en;
  const data = TERMS[lang] || TERMS.en;
  document.documentElement.lang = lang;
  document.title = `eyeday — ${ui.title}`;
  document.getElementById('title').textContent = ui.title;
  document.getElementById('langLabel').textContent = ui.langLabel;
  document.getElementById('content').innerHTML =
    '<p class="effective">' + data.effective + '</p>' + data.html;
  document.getElementById('langSwitch').value = lang;
  localStorage.setItem('eyeday_lang', lang);
}

document.addEventListener('DOMContentLoaded', () => {
  applyLang(pickInitialLang());
  document.getElementById('langSwitch').addEventListener('change', (e) => applyLang(e.target.value));
});
