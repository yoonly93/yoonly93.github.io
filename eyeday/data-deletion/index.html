const LANGS = Object.keys(DOCS);

function pickInitialLang() {
  const params = new URLSearchParams(location.search);
  const param = params.get('lang');
  if (param && LANGS.includes(param)) return param;
  const nav = (navigator.language || 'ko').toLowerCase();
  for (const l of LANGS) { if (nav.startsWith(l)) return l; }
  return 'ko';
}

function render(lang) {
  document.documentElement.lang = lang;
  document.getElementById('content').innerHTML = DOCS[lang] || DOCS.ko;
  const sel = document.getElementById('lang');
  if (sel) sel.value = lang;
}

document.addEventListener('DOMContentLoaded', () => {
  render(pickInitialLang());
  document.getElementById('lang').addEventListener('change', (e) => render(e.target.value));
});
</script>
