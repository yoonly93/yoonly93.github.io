<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoTodo - 나쁜 습관 교정 알림</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 50%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f5f5f5;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 16px; color: #999; margin-bottom: 32px; line-height: 1.5; }
    .features {
      text-align: left;
      background: #1f1f1f;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 32px;
    }
    .features h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      font-size: 15px;
      color: #ccc;
    }
    .feature-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f5f5f5;
      flex-shrink: 0;
    }
    .links {
      display: flex;
      justify-content: center;
      gap: 16px;
      font-size: 13px;
    }
    .links a { color: #666; text-decoration: none; }
    .links a:hover { color: #999; }
    .contact {
      margin-top: 16px;
      font-size: 13px;
      color: #555;
    }
    .contact a { color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>NoTodo</h1>
    <p class="subtitle">나쁜 자세 습관을<br>알림으로 교정해보세요</p>
    <div class="features">
      <h2>주요 기능</h2>
      <div class="feature"><span class="feature-dot"></span>나쁜 습관 알림으로 자세 교정</div>
      <div class="feature"><span class="feature-dot"></span>맞춤 알림 시간 설정</div>
      <div class="feature"><span class="feature-dot"></span>습관 추적 및 주간 리포트</div>
      <div class="feature"><span class="feature-dot"></span>다크 모드 지원</div>
      <div class="feature"><span class="feature-dot"></span>7개 언어 지원</div>
    </div>
    <div class="links">
      <a href="https://posiki.notion.site/NoTodo-Privacy-Policy-31609296d1e08181aa49da755c3b22c3?pvs=74">개인정보 처리방침</a>
      <span style="color:#444">|</span>
      <a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/">이용약관</a>
    </div>
    <div class="contact">
      <p>문의: <a href="mailto:wildkindground@gmail.com">wildkindground@gmail.com</a></p>
    </div>
  </div>
</body>
</html>
